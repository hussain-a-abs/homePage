<div class="surface-page ">

    <div class="w-full border-b divider surface-page px-6 py-3 flex items-center sticky top-0 z-10">
        <a routerLink="/" class="flex items-center gap-1.5 text-muted hover:text-accent transition-colors">
            <i-tabler name="arrow-left" class="text-[14px]" />
            Back
        </a>
        <span class="text-subheading absolute left-1/2 -translate-x-1/2">
            {{ project()?.title }}
        </span>
    </div>

    @if (project(); as proj) {
    <div class=" mx-auto px-6 py-10 flex flex-col gap-6">
        @if (!proj.isLive) {
            <div class="text-subheading flex self-center">
                PREVIEW
            </div>
        }
        <div class="flex flex-col gap-1">
            <div class="flex items-center gap-2">
                <h1 class="text-heading ">{{ proj.title }} </h1>
                <app-chip class="" [variant]="'light'">{{proj.displayType}}</app-chip>

            </div>

            <p class="text-caption">{{ proj.subtitle }}</p>
        </div>

        <markdown class="markdown-body whitespace-pre-wrap" [data]="proj.description"></markdown>

        <!-- @if (proj.displayType === 'demo') {
        <div class="flex flex-col gap-2">
          <span class="text-label">Live demo</span>
          <iframe
            [src]="proj.demoUrl"
            class="w-full h-[600px] rounded-tile border divider"
            frameborder="0">
          </iframe>
        </div>
      } -->

    </div>
    }

</div>
